# Railway build config (Nixpacks).
# install.sh is only for local Ubuntu setup — Railway never runs it,
# so the system packages it installs are declared here instead.
#
#   ffmpeg            -> required by discord-player for music playback
#   build-essential   -> compiler toolchain for native modules
#   libcairo2-dev     -> }
#   libpango1.0-dev   -> }  native build/runtime deps for the `canvas`
#   libjpeg-dev       -> }  package (level-up cards, ID cards)
#   libgif-dev        -> }
#   librsvg2-dev      -> }

[phases.setup]
aptPkgs = [
  "ffmpeg",
  "build-essential",
  "libcairo2-dev",
  "libpango1.0-dev",
  "libjpeg-dev",
  "libgif-dev",
  "librsvg2-dev",
]
